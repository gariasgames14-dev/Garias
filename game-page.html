<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Garias - Jogando</title>
    <style>
        body { background-color: #2b2b2b; margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .nav-bar { background: #6a1b9a; padding: 10px; border-bottom: 2px solid #000; }
        .btn-voltar { background: #4a90e2; color: white; border: 1px solid #000; padding: 8px 15px; cursor: pointer; text-decoration: none; font-weight: bold; border-radius: 4px; display: inline-block; }
        .game-container { flex-grow: 1; border: none; width: 100%; height: 100%; background: white; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="btn-voltar">← Voltar para o Garias</a>
    </div>
    <iframe id="gameFrame" class="game-container" src=""></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const game = urlParams.get('game');
        const frame = document.getElementById('gameFrame');

        // Quando você tiver o link oficial do jogo novo, coloque-o aqui:
        if (game === 'velha') {
            frame.src = "LINK_DO_SEU_NOVO_REPOSITORIO_AQUI";
        }
    </script>
</body>
</html>
